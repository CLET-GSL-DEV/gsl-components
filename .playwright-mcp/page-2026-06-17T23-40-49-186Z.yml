          - listitem [ref=e902]: Loading skeletons use a pulse animation; reduced-motion users get a static version.
          - listitem [ref=e903]:
            - text: Without a
            - code [ref=e904]: paramPrefix
            - text: ", keys are plain ("
            - code [ref=e905]: page
            - text: ","
            - code [ref=e906]: search
            - text: ","
            - code [ref=e907]: f_status
            - text: ). With one, they are namespaced (
            - code [ref=e908]: members.page
            - text: ","
            - code [ref=e909]: members.search
            - text: ","
            - code [ref=e910]: members.f_status
            - text: ).
          - listitem [ref=e911]:
            - code [ref=e912]: paramPrefix
            - text: is required on
            - code [ref=e913]: <Table>
            - text: — every table must have a unique namespace to avoid URL collisions.
          - listitem [ref=e914]:
            - text: The filter form captures all elements with a
            - code [ref=e915]: name
            - text: attribute via
            - code [ref=e916]: FormData
            - text: . For custom inputs (date pickers, multi-selects), ensure they set a
            - code [ref=e917]: name
            - text: and participate in
            - code [ref=e918]: FormData
            - text: .
          - listitem [ref=e919]:
            - text: "Selection is page-local: \"select all\" only selects rows on the current page. Selected state is fully controlled via"
            - code [ref=e920]: selectedIds
            - text: /
            - code [ref=e921]: onSelectionChange
            - text: .
          - listitem [ref=e922]: The select-all checkbox shows an indeterminate dash when some (but not all) rows on the page are selected. Clicking it selects all visible rows; clicking again deselects them.