        - heading "Notes" [level=2] [ref=e1052]
        - list [ref=e1053]:
          - listitem [ref=e1054]:
            - text: All URL writes are
            - code [ref=e1055]: "replace: true"
            - text: except page changes which use
            - code [ref=e1056]: pushState
            - text: for back-button support.
          - listitem [ref=e1057]: Changing search, filters, or page size automatically resets to page 1.
          - listitem [ref=e1058]:
            - text: Sort is client-side only (
            - code [ref=e1059]: localeCompare
            - text: ). No server integration.
          - listitem [ref=e1060]: Loading skeletons use a pulse animation; reduced-motion users get a static version.
          - listitem [ref=e1061]:
            - text: Without a
            - code [ref=e1062]: paramPrefix
            - text: ", keys are plain ("
            - code [ref=e1063]: page
            - text: ","
            - code [ref=e1064]: search
            - text: ","
            - code [ref=e1065]: f_status
            - text: ). With one, they are namespaced (
            - code [ref=e1066]: members.page
            - text: ","
            - code [ref=e1067]: members.search
            - text: ","
            - code [ref=e1068]: members.f_status
            - text: ).
          - listitem [ref=e1069]:
            - code [ref=e1070]: paramPrefix
            - text: is required on
            - code [ref=e1071]: <Table>
            - text: — every table must have a unique namespace to avoid URL collisions.
          - listitem [ref=e1072]:
            - text: The filter form captures all elements with a
            - code [ref=e1073]: name
            - text: attribute via
            - code [ref=e1074]: FormData
            - text: . For custom inputs (date pickers, multi-selects), ensure they set a
            - code [ref=e1075]: name
            - text: and participate in
            - code [ref=e1076]: FormData
            - text: .
          - listitem [ref=e1077]:
            - text: "Selection is page-local: \"select all\" only selects rows on the current page. Selected state is fully controlled via"
            - code [ref=e1078]: selectedIds
            - text: /
            - code [ref=e1079]: onSelectionChange
            - text: .
          - listitem [ref=e1080]: The select-all checkbox shows an indeterminate dash when some (but not all) rows on the page are selected. Clicking it selects all visible rows; clicking again deselects them.