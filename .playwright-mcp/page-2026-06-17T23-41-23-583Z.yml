          - listitem [ref=e901]: Loading skeletons use a pulse animation; reduced-motion users get a static version.
          - listitem [ref=e902]:
            - text: Without a
            - code [ref=e903]: paramPrefix
            - text: ", keys are plain ("
            - code [ref=e904]: page
            - text: ","
