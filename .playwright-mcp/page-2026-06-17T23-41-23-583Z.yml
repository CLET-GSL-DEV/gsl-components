            - code [ref=e907]: members.page
            - text: ","
            - code [ref=e908]: members.search
            - text: ","
            - code [ref=e909]: members.f_status
            - text: ).
          - listitem [ref=e910]:
            - code [ref=e911]: paramPrefix
            - text: is required on
            - code [ref=e912]: <Table>
            - text: — every table must have a unique namespace to avoid URL collisions.
          - listitem [ref=e913]:
            - text: The filter form captures all elements with a
            - code [ref=e914]: name
            - text: attribute via
            - code [ref=e915]: FormData
            - text: . For custom inputs (date pickers, multi-selects), ensure they set a
            - code [ref=e916]: name
            - text: and participate in
            - code [ref=e917]: FormData
            - text: .
          - listitem [ref=e918]:
            - text: "Selection is page-local: \"select all\" only selects rows on the current page. Selected state is fully controlled via"
            - code [ref=e919]: selectedIds
            - text: /
            - code [ref=e920]: onSelectionChange
            - text: .
          - listitem [ref=e921]: The select-all checkbox shows an indeterminate dash when some (but not all) rows on the page are selected. Clicking it selects all visible rows; clicking again deselects them.